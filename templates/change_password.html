{% extends 'base.html' %}
{% block title %}Change Password — MY DSP{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="page-header">
  <h4><i class="bi bi-key-fill me-2"></i>Change Password</h4>
</div>
<form method="POST" class="form-card" style="max-width:480px;">
  <div class="mb-3">
    <label class="form-label">Current Password</label>
    <input type="password" name="current_password" class="form-control" required autocomplete="current-password">
  </div>
  <div class="mb-3">
    <label class="form-label">New Password</label>
    <input type="password" name="new_password" class="form-control" required minlength="6" autocomplete="new-password">
    <div class="form-text">Minimum 6 characters.</div>
  </div>
  <div class="mb-4">
    <label class="form-label">Confirm New Password</label>
    <input type="password" name="confirm_password" class="form-control" required autocomplete="new-password">
  </div>
  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Update Password</button>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
