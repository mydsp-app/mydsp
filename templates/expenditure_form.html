{% extends 'base.html' %}
{% block title %}{{ 'Edit' if entry else 'New' }} Expenditure — MY DSP{% endblock %}
{% block page_title %}{{ 'Edit' if entry else 'New' }} Expenditure Entry{% endblock %}
{% block content %}
<div class="page-header">
  <h4><i class="bi bi-arrow-up-circle-fill text-danger me-2"></i>{{ 'Edit' if entry else 'New' }} Expenditure Entry</h4>
  <a href="{{ url_for('expenditure') }}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<form method="POST" class="form-card">
  <div class="row g-3">
    <div class="col-md-4">
      <label class="form-label">Date *</label>
      <input type="date" name="entry_date" class="form-control" required value="{{ entry.entry_date[:10] if entry and entry.entry_date else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Month Period</label>
      <input type="text" name="month_period" class="form-control" placeholder="e.g. April 2026" value="{{ entry.month_period if entry else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Category *</label>
      <select name="category" class="form-select" required>
        <option value="">-- Select --</option>
        {% for cat in ['Staff Wages','Superannuation','Rent / Lease','Utilities','Insurance','Vehicle / Transport','Office Supplies','Professional Services','Marketing','Technology / Software','Training','Repairs & Maintenance','Participant Costs','Other'] %}
        <option {{ 'selected' if entry and entry.category == cat }}>{{ cat }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Sub-Category</label>
      <input type="text" name="sub_category" class="form-control" value="{{ entry.sub_category if entry else '' }}">
    </div>
    <div class="col-md-8">
      <label class="form-label">Description</label>
      <input type="text" name="description" class="form-control" value="{{ entry.description if entry else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Supplier</label>
      <input type="text" name="supplier" class="form-control" value="{{ entry.supplier if entry else '' }}">
    </div>
    <div class="col-md-4">
      <label class="form-label">Amount ($) *</label>
      <div class="input-group"><span class="input-group-text">$</span>
        <input type="number" name="amount" class="form-control" step="0.01" required value="{{ entry.amount if entry else '' }}">
      </div>
    </div>
    <div class="col-md-4">
      <label class="form-label">Payment Method</label>
      <select name="payment_method" class="form-select">
        <option value="">-- Select --</option>
        {% for m in ['Bank Transfer','Credit Card','Cash','Cheque','Direct Debit'] %}
        <option {{ 'selected' if entry and entry.payment_method == m }}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-4">
      <label class="form-label">Invoice Number</label>
      <input type="text" name="invoice_number" class="form-control" value="{{ entry.invoice_number if entry else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">Linked Participant</label>
      <select name="participant_id" id="participant_id" class="form-select">
        <option value="">-- None --</option>
        {% for p in participants_list %}
        <option value="{{ p.id }}" {{ 'selected' if entry and entry.participant_id == p.id }}>{{ p.full_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label">Notes</label>
      <input type="text" name="notes" class="form-control" value="{{ entry.notes if entry else '' }}">
    </div>
  </div>
  <div class="mt-4 d-flex gap-2">
    <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i>Save Entry</button>
    <a href="{{ url_for('expenditure') }}" class="btn btn-outline-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
